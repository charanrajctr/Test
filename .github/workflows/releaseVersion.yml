name: Individual Service Release

on:
  push:
    branches:
      - v1-dev

jobs:
  create-tags:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Individual Tags
        run: |
          # Define the services and version
          SERVICES=("auth" "gateway" "common" "config" "react")
          VERSION="1.0.0"

          for service in "${SERVICES[@]}"; do
            TAG_NAME="${service}-${VERSION}"
            echo "Processing tag: $TAG_NAME"
            
            # Create tag locally
            git tag $TAG_NAME
            
            # Push tag to origin
            git push origin $TAG_NAME
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
