name: Automated Release

on:
  push:
    branches:
      - v1-dev

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: 1.0.0
          name: Auto Release 1.0.0
          body: |
            Automated release for version 1.0.0.
            Includes updates for:
            - auth
            - gateway
            - common
            - config
            - react
          target_commitish: v1-dev
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
